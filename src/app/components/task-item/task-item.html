<!-- Single task row: checkbox, title, and priority label. -->
<li class="task-item" [class.done]="task().completed">
  <input
    type="checkbox"
    [checked]="task().completed"
    (change)="toggleComplete.emit(task().id)"
  />
  <span class="title">{{ task().title }}</span> <!-- interpolating show data as text -->
  <span class="priority">{{ task().priority }}</span>
</li>
