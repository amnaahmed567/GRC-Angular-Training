<!-- Task list template: add-task input plus the list of task-item children. -->
<section class="task-list">
  <h2>My Tasks</h2>

  <!-- Full reactive create form on its own page -->
  <a class="new-task" [routerLink]="['/tasks/new']">+ New Task (full form)</a>

  <div class="add-task">
    <!-- [(ngModel)] = two-way binding (input ⇄ data) -->
    <!-- (keyup.enter) = event binding: Enter key calls addTask() -->
    <input
      type="text"
      placeholder="New task..."
      [(ngModel)]="newTitle"
      (keyup.enter)="addTask()"
    />
    <!-- Pick the priority for the new task -->
    <select [(ngModel)]="newPriority" aria-label="Priority">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
    <button type="button" (click)="addTask()">Add</button>
  </div>

  @if (error()) {
    <p class="error" role="alert">
      {{ error() }}
      <button type="button" (click)="loadTasks()">Retry</button>
    </p>
  }

  <!-- Signals drive the view: loading first, then the list or the empty state. -->
  @if (loading()) {
    <p class="loading">Loading tasks…</p>
  } @else if (tasks().length > 0) {
    <ul>
      <!-- [task] = property binding: data from component to child -->
      @for (task of tasks(); track task.id) {
        <app-task-item
          [task]="task"
          (toggleComplete)="onToggle($event)"
          (deleteTask)="onDelete($event)"
        />
      }
    </ul>
  } @else {
    <p class="empty">No tasks yet. 🎉</p>
  }
</section>
